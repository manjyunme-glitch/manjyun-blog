services:
  manjyun-blog:
    image: ${BLOG_IMAGE:-manjyun-blog:latest}
    pull_policy: build
    build:
      context: .
      args:
        HTTP_PROXY: ${STACK_HTTP_PROXY:-}
        HTTPS_PROXY: ${STACK_HTTPS_PROXY:-}
        NO_PROXY: ${STACK_NO_PROXY:-}
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        GITHUB_REPOSITORY: ${GITHUB_REPOSITORY:-manjyunme-glitch/manjyun-blog}
        GITHUB_BRANCH: ${GITHUB_BRANCH:-main}
        BUILDKIT_CONTEXT_KEEP_GIT_DIR: "1"
        http_proxy: ${STACK_HTTP_PROXY:-}
        https_proxy: ${STACK_HTTPS_PROXY:-}
        no_proxy: ${STACK_NO_PROXY:-}
    container_name: ${CONTAINER_NAME_PREFIX:-mblog}-app
    restart: unless-stopped
    init: true
    network_mode: bridge
    # New deployments run as the image's unprivileged nextjs user by default.
    # An existing stack that explicitly sets 0:0 keeps its legacy behavior.
    user: "${BLOG_UID:-1001}:${BLOG_GID:-1001}"
    security_opt:
      - no-new-privileges:true
    ports:
      - "${BLOG_BIND_IP:-0.0.0.0}:${BLOG_PORT:-4482}:3000"
    environment:
      NODE_ENV: production
      TZ: ${TZ:-Asia/Shanghai}
      HOSTNAME: 0.0.0.0
      PORT: 3000
      DATA_DIR: /app/data
      DATABASE_PATH: /app/data/manjyun.sqlite
      UPLOADS_DIR: /app/uploads
      STACK_BASE_DIR_HOST: ${STACK_BASE_DIR:?STACK_BASE_DIR must be an absolute persistent host directory}
      SITE_URL: ${SITE_URL:?SITE_URL must be the public absolute URL}
      AUTH_SECRET: ${AUTH_SECRET:-}
      SETUP_TOKEN: ${SETUP_TOKEN:-}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-}
      AUTH_TRUST_PROXY_HOPS: ${AUTH_TRUST_PROXY_HOPS:-0}
      GIT_COMMIT: ${GIT_COMMIT:-unknown}
      GITHUB_REPOSITORY: ${GITHUB_REPOSITORY:-manjyunme-glitch/manjyun-blog}
      GITHUB_BRANCH: ${GITHUB_BRANCH:-main}
      PORTAINER_URL: ${PORTAINER_URL:-}
      PORTAINER_STACK_ID: ${PORTAINER_STACK_ID:-}
      PORTAINER_API_KEY: ${PORTAINER_API_KEY:-}
      HTTP_PROXY: ${STACK_HTTP_PROXY:-}
      HTTPS_PROXY: ${STACK_HTTPS_PROXY:-}
      NO_PROXY: ${STACK_NO_PROXY:-}
      http_proxy: ${STACK_HTTP_PROXY:-}
      https_proxy: ${STACK_HTTPS_PROXY:-}
      no_proxy: ${STACK_NO_PROXY:-}
    volumes:
      - ${STACK_BASE_DIR:?STACK_BASE_DIR must be an absolute persistent host directory}/data:/app/data
      - ${STACK_BASE_DIR:?STACK_BASE_DIR must be an absolute persistent host directory}/uploads:/app/uploads
    healthcheck:
      test:
        - CMD-SHELL
        - >
          node -e "fetch('http://127.0.0.1:' + (process.env.PORT || '3000') + '/')
          .then((r) => process.exit(r.ok ? 0 : 1))
          .catch(() => process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
